version: '3.8'

services:
  db:
    image: postgres:15
    container_name: booking_db
    environment:
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass
      POSTGRES_DB: booking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: booking-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://booking_user:booking_pass@db:5432/booking_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: